name: Cross-Repo Actuator

on: [push]

jobs:
  actuate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Actuator Script
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_REPOS: ${{ secrets.TARGET_REPOS }}
          YOUTUBE_URL: ${{ vars.YOUTUBE_URL }}
          LOVE_PAGE: ${{ vars.LOVE_PAGE }}
        run: node sync-repos.js
